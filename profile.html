<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MizuRa Preset - Profil Creator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        
        body { 
            background: #060713; color: #ffffff; min-height: 100vh;
            display: flex; justify-content: center; overflow-x: hidden;
        }

        /* Ambient Glow Background */
        body::before {
            content: ''; position: fixed; top: -10%; left: -20%; width: 300px; height: 300px;
            background: rgba(0, 242, 254, 0.12); filter: blur(120px); border-radius: 50%; z-index: -1;
        }

        .wrapper { 
            width: 100%; max-width: 450px; background: rgba(15, 16, 38, 0.5);
            backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            min-height: 100vh; padding: 24px 20px; padding-bottom: 40px;
            box-shadow: 0 0 40px rgba(0,0,0,0.6);
            border-left: 1px solid rgba(255, 255, 255, 0.03); border-right: 1px solid rgba(255, 255, 255, 0.03);
        }

        /* Tombol Back ala TikTok */
        .header-nav { display: flex; align-items: center; margin-bottom: 25px; }
        .btn-back { 
            text-decoration: none; color: #fff; background: rgba(255,255,255,0.05); 
            padding: 8px 14px; border-radius: 20px; font-size: 0.8rem; font-weight: 600;
            border: 1px solid rgba(255,255,255,0.08);
        }

        /* Header Profil */
        .profile-header { display: flex; flex-direction: column; align-items: center; text-align: center; margin-bottom: 30px; }
        .profile-avatar { 
            width: 80px; height: 80px; background: #13152e; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: 700; font-size: 2rem; border: 3px solid #00f2fe;
            box-shadow: 0 0 20px rgba(0, 242, 254, 0.2); margin-bottom: 12px;
        }
        .profile-name { font-size: 1.3rem; font-weight: 700; color: #fff; }
        .profile-username { font-size: 0.85rem; color: #00f2fe; margin-bottom: 15px; font-weight: 500; }
        
        /* Statistik Kreator — sekarang border-radius 18px biar match sama ad */
        .stats-box { 
            display: flex; gap: 20px; background: rgba(255,255,255,0.02); 
            padding: 12px 30px; border-radius: 18px; border: 1px solid rgba(255,255,255,0.05);
        }
        .stat-item { display: flex; flex-direction: column; align-items: center; }
        .stat-val { font-size: 1.1rem; font-weight: 700; color: #fff; }
        .stat-lbl { font-size: 0.75rem; color: rgba(255,255,255,0.4); text-transform: uppercase; margin-top: 2px; }

        /* Bagian Konten/Grid Video */
        h3 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: rgba(255,255,255,0.6); border-bottom: 2px solid #00f2fe; display: inline-block; padding-bottom: 4px; }
        
        .preset-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
        .preset-card { 
            background: rgba(255, 255, 255, 0.02); border-radius: 18px; overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.04); text-decoration: none; color: #fff;
            display: flex; flex-direction: column;
        }
        
        .media-preview { width: 100%; height: 210px; background: #03040b; position: relative; overflow: hidden; }
        .media-preview video, .media-preview img { width: 100%; height: 100%; object-fit: cover; display: block; }
        .media-preview::after { content: ''; position: absolute; bottom: 0; left: 0; width: 100%; height: 40%; background: linear-gradient(to top, rgba(0,0,0,0.6), transparent); pointer-events: none; }
        
        .card-info { padding: 12px; }
        .card-title { font-size: 0.8rem; font-weight: 500; line-height: 1.4; color: rgba(255, 255, 255, 0.9); height: 2.8em; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
        
        .loading { text-align: center; color: rgba(255, 255, 255, 0.3); font-size: 0.85rem; padding: 30px; width: 100%; grid-column: span 2; }

        /* Ad Container — sudah 18px, sekarang stats box ikut sama */
        .ad-container {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 18px;
            padding: 12px 10px 10px;
            max-width: 300px;
            margin: 10px auto 20px auto;
            text-align: center;
        }
        .ad-label {
            font-size: 0.58rem;
            color: rgba(255,255,255,0.3);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
            font-weight: 600;
        }
        .ad-inner {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }
    </style>
</head>
<body>

    <div class="wrapper">
        <div class="header-nav">
            <a href="home.html" class="btn-back">⬅ KEMBALI</a>
        </div>

        <div class="profile-header">
            <div class="profile-avatar" id="prof-avatar">-</div>
            <div class="profile-name" id="prof-name">Memuat...</div>
            <div class="profile-username" id="prof-username">@...</div>
            
            <div class="stats-box">
                <div class="stat-item">
                    <span class="stat-val" id="stat-preset">0</span>
                    <span class="stat-lbl">Presets</span>
                </div>
            </div>
        </div>

        <!-- IKLAN -->
        <div class="ad-container">
            <div class="ad-label">SPONSORED</div>
            <div class="ad-inner">
                <script>
                  atOptions = {
                    'key' : '9d8c7a557a4e4cd8023a8b293498cb2d',
                    'format' : 'iframe',
                    'height' : 250,
                    'width' : 300,
                    'params' : {}
                  };
                </script>
                <script src="https://www.highperformanceformat.com/9d8c7a557a4e4cd8023a8b293498cb2d/invoke.js"></script>
            </div>
        </div>

        <h3>Karya Video</h3>
        <div class="preset-grid" id="profile-grid">
            <div class="loading">Memuat video kreator...</div>
        </div>
    </div>

    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const creatorTarget = urlParams.get('user'); 
        const jsonUrl = 'data.json';

        if (creatorTarget) {
            fetch(jsonUrl)
                .then(res => res.json())
                .then(data => {
                    const kepinganPreset = data.filter(item => (item.creator || '').toLowerCase() === creatorTarget.toLowerCase());
                    
                    if (kepinganPreset.length > 0) {
                        const namaAsli = kepinganPreset[0].creator;
                        document.getElementById('prof-name').innerText = namaAsli.replace('@', '');
                        document.getElementById('prof-username').innerText = namaAsli.toLowerCase();
                        document.getElementById('prof-avatar').innerText = namaAsli.replace('@', '').charAt(0).toUpperCase();
                        document.getElementById('stat-preset').innerText = kepinganPreset.length;

                        bikinGridKreator(kepinganPreset);
                    } else {
                        document.getElementById('prof-name').innerText = "Kreator Tidak Ditemukan";
                    }
                })
                .catch(() => {
                    document.getElementById('profile-grid').innerHTML = '<div class="loading">Gagal memuat profil</div>';
                });
        }

        function bikinGridKreator(presetList) {
            const container = document.getElementById('profile-grid');
            container.innerHTML = '';

            presetList.forEach(item => {
                const videoExtensions = ['.mp4', '.mov', '.avi'];
                const isVideo = videoExtensions.some(ext => item.link_video.toLowerCase().endsWith(ext));
                
                let mediaHtml = isVideo 
                    ? `<video class="profile-preview-video" src="${item.link_video}" preload="metadata" loop muted playsinline></video>`
                    : `<img src="${item.link_video}" loading="lazy">`;

                const cardHtml = ` 
                    <div class="preset-card" onclick="location.href='index.html?id=${item.id}'">
                        <div class="media-preview">${mediaHtml}</div>
                        <div class="card-info">
                            <div class="card-title">${item.judul}</div>
                        </div>
                    </div>
                `;
                container.insertAdjacentHTML('beforeend', cardHtml);
            });

            aktifkanSistemVideo();
        }

        function aktifkanSistemVideo() {
            const semuaVideo = document.querySelectorAll('.profile-preview-video');
            const sensor = new IntersectionObserver((daftar) => {
                daftar.forEach(v => { if (!v.isIntersecting) { v.target.pause(); v.target.currentTime = 0; } });
            }, { threshold: 0.1 });

            semuaVideo.forEach(video => {
                sensor.observe(video);
                const penampung = video.closest('.preset-card');
                
                penampung.addEventListener('mouseenter', () => video.play().catch(()=>{}));
                penampung.addEventListener('mouseleave', () => { video.pause(); video.currentTime = 0; });
                penampung.addEventListener('touchstart', () => {
                    semuaVideo.forEach(vid => { if(vid !== video) { vid.pause(); vid.currentTime = 0; } });
                    video.play().catch(()=>{}); 
                }, { passive: true });
                penampung.addEventListener('touchend', () => { setTimeout(() => { video.pause(); video.currentTime = 0; }, 300); }, { passive: true });
            });
        }
    </script>
</body>
</html>
